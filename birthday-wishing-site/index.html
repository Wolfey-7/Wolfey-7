<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Happy Birthday!</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1 class="title">🎉 Happy Birthday!</h1>
      <p class="subtitle">Send a personal wish and celebrate with confetti.</p>

      <div class="form-row">
        <input id="nameInput" type="text" placeholder="Enter name (e.g. Alex)" aria-label="Name" />
        <button id="wishBtn">Send Wishes</button>
      </div>

      <div id="greeting" class="greeting hidden"></div>

      <div class="surprise">
        <div class="cake">🎂</div>
        <div class="balloons">🎈🎈🎈</div>
      </div>
    </section>
  </main>

  <canvas id="confettiCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
